# docker-compose.experiments.yml
#
# Experiment-only overlay. NOT loaded by default. Brings up a Camoufox
# sidecar for the PoC documented in experiments/README.md. Lives on the
# experiment/camoufox-poc branch only.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.experiments.yml up camoufox
#
# Or to bring up FGC + Camoufox sidecar together:
#   docker compose -f docker-compose.yml -f docker-compose.experiments.yml up -d
#
# Verified Tier 0 baseline (2026-05-09 from the experiment branch):
# - Image pulls cleanly (~600MB).
# - Image is jo-inc/camofox-browser v1.9.0 — a REST API server (NOT a
#   Playwright-compatible CDP/BiDi endpoint). Spec at
#   http://localhost:9377/api when running.
# - Cold navigation to https://m.aliexpress.com/p/coin-index/index.html
#   redirects to the login page with no AWSC challenge on first hit.
# - VNC ships disabled by default; flip ENABLE_VNC=1 to turn on.

services:
  camoufox:
    image: ghcr.io/jo-inc/camofox-browser:latest
    container_name: fgc-camoufox-poc
    restart: "no"  # PoC service — never auto-restart
    ports:
      # Camoufox REST API. Hostname `camoufox` from the FGC container's
      # network; localhost:9377 from the host.
      - "9377:9377"
      # VNC for Tier 0 manual testing — connect with any VNC viewer at
      # localhost:5901. Mapped to the container's 5900 because we set
      # ENABLE_VNC=1 below; the noVNC websockify is also available
      # internally on 6080 but we don't expose it (use the panel's main
      # noVNC at the regular host:6080 instead, on a different VNC
      # session).
      - "5901:5900"
    environment:
      # Turn on the in-image VNC plugin so Tier 0 manual testing works.
      # Without this the API still works fine but you can't watch.
      - ENABLE_VNC=1
      # Optional: bearer auth for sensitive endpoints. Leave unset for
      # the PoC — we're testing locally on a single trusted box.
      # - CAMOFOX_API_KEY=poc-secret
      # - CAMOFOX_ACCESS_KEY=poc-superkey
    # No volumes — each PoC run starts with a fresh Camoufox profile so
    # we're not measuring "this profile got flagged by AWSC last week".

# Note on networking: the shipped docker-compose.yml defines no explicit
# networks block, so both services default to `free-games-claimer_default`
# (or the equivalent in your personal compose). That's what allows the
# Tier 1 runner inside the FGC container to reach the sidecar at
# `http://camoufox:9377`. If you've customized the FGC service into a
# different network in your personal compose, add `networks: [...]` to
# this `camoufox:` block to match — otherwise the runner won't resolve
# the hostname.
